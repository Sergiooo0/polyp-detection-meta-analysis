#Base Settings
defaults:
  - _self_
  - files: polyp
  - connection: jetson
  - mlflow: mlflow
  - experiment: null
params:
  protocol: t1
  seed: 42
  val_ratio: 0.2
  # If true, regenerates cached intermediates (e.g., SUN flat images/labels) even if they already exist.
  force_rebuild_cache: false
  # Route to the custom model YOLO yaml file or the name of a ultralystics model yaml.
  model: yolo11n.yaml
  pretrained_weights: null
  model_name: yolom
  img_size: 640
  epochs: 250
  experiment_name: polyp_detection
  batch_size: 32
  lr: 0.0015
  lrf: 0.3
  momentum: 0.937
  cos_lr: true
  warmup_epochs: 10.0
  patience: 100
  weight_decay: 0.0005
  optimizer: AdamW
  device: [0, 1]
  # --- Data Augmentation ---
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 15.0
  translate: 0.1
  flipud: 0.5
  fliplr: 0.5
  mosaic: 1.0
  close_mosaic: 10
  scale: 0.5
  erasing: 0.0
  mixup: 0.0
  # lr in fine tunning phase without mosaic augmentation.
  final_phase_lr: 0.001
  # Extra epochs after the base training, always run without mosaic augmentation.
  final_no_mosaic_epochs: 0

test:
  top_k: 50
  metric: val_AP50_95
  experiment_name: polyp_detection
  img_size: 640
  precision_mode: FP16
  start_k: 0
  protocol: t1
