# @package _global_

# config for Hyperparameter Optimization with Optuna
# python src/train.py -m +hpo=optuna
# python src/train.py -m +hpo=optuna hydra.sweeper.n_trials=35

defaults:
  - override /hydra/sweeper: optuna

hydra:
  sweeper:
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      n_startup_trials: 10
    direction: maximize
    n_trials: 25
    params:
      params.epochs: 250
      params.batch_size: 32
      params.lr: interval(0.001, 0.03)
      params.lrf: interval(0.05, 0.3)
      params.protocol: t1
      params.experiment_name: optuna
      
      